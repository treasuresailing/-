<body>

<tbody id="history"></tbody>
</table>

<h3>✏️ 소비 성찰</h3>

<p>내가 가장 잘한 소비는?</p>
<textarea></textarea>

<p>앞으로 실천하고 싶은 소비 습관은?</p>
<textarea></textarea>

<button class="primary" onclick="location.reload()">
다시 하기
</button>

</div>

</div>

<script>

const quiz = [

{
tag:"모방소비",

A:{

}
},

{

},

}
},

{
tag:"과소비",
q:"운동화를 산다.",
A:{
n:"실용적인 운동화",

issue:"오래 신을 수 있었다.",
ec:0,

},
B:{
n:"한정판 운동화",

}
},

{
tag:"충동소비",
q:"게임을 한다.",
A:{
n:"무료로 즐긴다",
c:0,
s:40,
issue:"친구와 즐겁게 놀았다.",
ec:0,
es:120
},
B:{
n:"아이템 구매",
c:50000,
s:80,
issue:"곧 더 좋은 아이템이 나왔다.",
ec:0,
es:-130
}
},

{
tag:"합리소비",
q:"휴대폰 케이스를 고른다.",
A:{
n:"튼튼한 제품",
c:15000,
s:60,
issue:"오래 사용할 수 있었다.",
ec:0,
es:140
},
B:{
n:"비싼 캐릭터 제품",
c:50000,
s:80,
issue:"금방 질렸다.",
ec:0,
es:-120
}
},

{
tag:"합리소비",
q:"용돈을 받았다.",
A:{
n:"절반 저금",
c:10000,
s:50,
issue:"필요할 때 사용할 수 있었다.",

},
B:{
n:"바로 사용",

ec:0,
es:-140
}
},

{
tag:"충동소비",
q:"목이 마르다.",
A:{
n:"물 마시기",
c:1000,
s:40,
issue:"갈증이 해소되었다.",
ec:0,
es:120
},
B:{
n:"비싼 음료 구매",
c:7000,
s:80,
issue:"금방 다 마셨다.",
ec:0,
es:-90
}
},

{
tag:"과소비",
q:"생일 용돈을 사용한다.",
A:{
n:"필요한 물건 구매",
c:30000,
s:60,
issue:"계속 만족하며 사용했다.",
ec:0,
es:140
},
B:{
n:"유행 상품 구매",
c:200000,
s:90,
issue:"곧 관심이 사라졌다.",
ec:0,
es:-180
}
}

];

let idx=0;
let totalCost=0;
let totalSat=0;
let current=null;
let history=[];

function startGame(){
document.getElementById("start").classList.add("hidden");
document.getElementById("game").classList.remove("hidden");
loadQuestion();
}

function loadQuestion(){

const q=quiz[idx];

document.getElementById("tag").innerText=q.tag;
document.getElementById("question").innerText=q.q;

document.getElementById("btnA").innerText=q.A.n;
document.getElementById("btnB").innerText=q.B.n;

document.getElementById("btnA").onclick=()=>choose(q.A);
document.getElementById("btnB").onclick=()=>choose(q.B);
}

function choose(choice){

current=choice;

totalCost += choice.c + choice.ec;
totalSat += choice.s + choice.es;

history.push({
name:choice.n,
cost:choice.c+choice.ec,
sat:choice.s+choice.es
});

document.getElementById("game").classList.add("hidden");
document.getElementById("issue").classList.remove("hidden");

document.getElementById("issueText").innerText=choice.issue;
document.getElementById("issueCost").innerText=choice.ec;
document.getElementById("issueSat").innerText=choice.es;
}

function nextQuestion(){

idx++;

document.getElementById("issue").classList.add("hidden");

if(idx>=quiz.length){
showResult();
return;
}

document.getElementById("game").classList.remove("hidden");
loadQuestion();
}

function showResult(){

document.getElementById("result").classList.remove("hidden");

document.getElementById("finalCost").innerText=
totalCost.toLocaleString();

document.getElementById("finalSat").innerText=
totalSat;

let grade="";
let comment="";

if(totalSat>=100 && totalCost<=200000){
grade="🏆 소비 마스터";
comment="적은 비용으로 높은 만족을 얻었습니다.";
}
else if(totalSat>=50){
grade="🥇 합리적 소비왕";
comment="대체로 현명한 소비를 했습니다.";
}
else if(totalSat>=0){
grade="⚠️ 소비 습관 점검";
comment="조금 더 계획적인 소비가 필요합니다.";
}
else{
grade="🚨 충동소비 위험";
comment="순간의 즐거움 때문에 많은 비용을 사용했습니다.";
}

document.getElementById("grade").innerText=grade;
document.getElementById("comment").innerText=comment;

const tbody=document.getElementById("history");

history.forEach((h,i)=>{
tbody.innerHTML += `
<tr>
<td>${i+1}</td>
<td>${h.name}</td>
<td>${h.cost.toLocaleString()}</td>
<td>${h.sat}</td>
</tr>
`;
});
}

</script>

</body>
</html>
