<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>합리적 선택 탐험대 2.0</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=DungGeunMo&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Gaegu', sans-serif; font-size: 1.1rem; }
    .pixel-font { font-family: 'DungGeunMo', monospace; }
    .compact-table td, .compact-table th { padding: 2px 4px; font-size: 0.7rem; line-height: 1; }
  </style>
</head>
<body class="bg-indigo-50 min-h-screen flex flex-col items-center justify-center p-2">

  <main id="gameWrapper" class="w-full max-w-lg bg-white rounded-3xl shadow-2xl border-4 border-purple-300 p-4 relative">
    
    <!-- [1] 시작 화면 -->
    <div id="screenStart" class="text-center py-4">
      <h1 class="text-3xl font-extrabold text-purple-600 pixel-font mb-4">합리적 선택 탐험대 2.0</h1>
      <div class="bg-purple-50 p-4 rounded-xl text-sm font-bold text-purple-900 mb-6">
        "12번의 선택을 통해 최고의 만족감을 찾아라!"<br>
        타이머가 0초가 되어도 강제로 넘어가지 않으니, 충분히 생각하고 고민한 뒤 선택하세요.
      </div>
      <button onclick="startGame()" class="w-full bg-gradient-to-r from-purple-500 to-pink-500 text-white font-extrabold py-3 rounded-xl shadow-lg text-xl">시작하기 🧭</button>
    </div>

    <!-- [2] 플레이 화면 -->
    <div id="screenPlay" class="hidden space-y-3">
      <div class="flex justify-between text-xs font-bold text-gray-500">
        <span id="qTag" class="bg-pink-100 text-pink-700 px-2 py-0.5 rounded-full">분류</span>
        <span id="timerText" class="text-rose-600">⏱️ 45초</span>
      </div>
      <h2 id="questionText" class="text-lg font-extrabold text-gray-800 text-center">질문</h2>
      <div class="grid grid-cols-2 gap-2">
        <button id="btnA" class="border-2 border-purple-300 p-3 rounded-xl font-bold text-purple-800">A 선택</button>
        <button id="btnB" class="border-2 border-pink-300 p-3 rounded-xl font-bold text-pink-800">B 선택</button>
      </div>
      <p id="waitMsg" class="hidden text-center text-rose-500 text-xs font-bold animate-pulse">💡 충분히 생각했나요? 선택지를 눌러주세요!</p>
    </div>

    <!-- [3] 돌발 상황 화면 -->
    <div id="screenIssue" class="hidden text-center py-4">
      <h2 class="text-xl font-extrabold text-amber-500">🚨 돌발 변수!</h2>
      <p id="issueDesc" class="text-sm font-bold my-3">상황 설명</p>
      <div class="flex justify-center gap-4 text-xs font-bold mb-4">
        <span id="issueCost" class="text-red-600">비용: 0</span>
        <span id="issueSat" class="text-blue-600">만족감: 0</span>
      </div>
      <button id="btnConfirm" class="bg-purple-600 text-white px-6 py-2 rounded-lg font-bold">확인</button>
    </div>

    <!-- [4] 결과 화면 -->
    <div id="screenResult" class="hidden space-y-3">
      <div id="report-capture-area" class="p-2 bg-white rounded-xl border border-purple-200">
        <h2 class="text-center font-extrabold text-purple-700 text-sm">탐험 결과 보고서</h2>
        <table class="compact-table w-full border-collapse mt-2">
          <thead><tr class="bg-purple-100 text-xs text-purple-800"><th>상황</th><th>선택</th><th>비용</th><th>만족</th></tr></thead>
          <tbody id="resultTableBody"></tbody>
        </table>
        <div class="mt-2 text-center font-extrabold text-sm">
          총 비용: <span id="finalCost" class="text-red-600">0</span>원 | 총 만족감: <span id="finalSat" class="text-blue-600">0</span>점
        </div>
      </div>
      <button id="btnDownload" class="w-full bg-green-500 text-white font-bold py-3 rounded-xl">📥 보고서 이미지 저장</button>
      <p class="text-center text-[10px] text-gray-500">저장된 이미지를 패들렛에 올리고 성찰을 적으세요!</p>
    </div>
  </main>

  <script>
    let currentIdx = 0, cost = 0, sat = 0, timer = null, timeLeft = 45;
    const quizData = [
      {q:"저녁 메뉴", tag:"만족소비", A:{n:"짜장면",c:7000,s:120,is:"늦게 나옴",ec:0,es:-20}, B:{n:"짬뽕",c:9000,s:150,is:"국물 튐",ec:3000,es:-30}},
      {q:"간식 선택", tag:"충동소비", A:{n:"사탕",c:1000,s:80,is:"머리에 붙음",ec:5000,es:-20}, B:{n:"초콜릿",c:2000,s:100,is:"치과 행",ec:10000,es:-50}},
      {q:"계절 선호", tag:"과소비", A:{n:"여름(에어컨)",c:50000,s:150,is:"감기 걸림",ec:10000,es:-50}, B:{n:"겨울(여행)",c:100000,s:200,is:"가족 여행",ec:0,es:50}},
      {q:"풍경 선호", tag:"만족소비", A:{n:"산",c:0,s:100,is:"쾌적함",ec:0,es:20}, B:{n:"바다",c:5000,s:120,is:"교통체증",ec:10000,es:-30}},
      {q:"스케이트 수리", tag:"합리소비", A:{n:"고쳐타기",c:30000,s:150,is:"잘 나감",ec:0,es:50}, B:{n:"새것구매",c:50000,s:100,is:"뒤꿈치 까짐",ec:0,es:-100}},
      {q:"영화 보기", tag:"만족소비", A:{n:"영화관",c:15000,s:150,is:"배우 등장",ec:0,es:100}, B:{n:"집(OTT)",c:0,s:80,is:"배달 과소비",ec:20000,es:-40}},
      {q:"문구점 필통", tag:"모방소비", A:{n:"기존필통",c:0,s:100,is:"검소함",ec:0,es:20}, B:{n:"유행필통",c:15000,s:120,is:"곧 유행지남",ec:5000,es:-50}},
      {q:"편의점 과자", tag:"충동소비", A:{n:"1봉지",c:1500,s:80,is:"알뜰함",ec:0,es:30}, B:{n:"2+1행사",c:3000,s:90,is:"남아서 버림",ec:0,es:-40}},
      {q:"운동화", tag:"합리소비", A:{n:"국산화",c:35000,s:130,is:"발이 편함",ec:0,es:30}, B:{n:"한정판",c:120000,s:140,is:"친구들 질투",ec:0,es:-80}},
      {q:"놀이 후 음료", tag:"충동소비", A:{n:"생수",c:800,s:100,is:"갈증 해소",ec:0,es:20}, B:{n:"탄산음료",c:2000,s:90,is:"배탈",ec:3000,es:-30}},
      {q:"자전거", tag:"합리소비", A:{n:"중고",c:50000,s:140,is:"헬멧 구매",ec:0,es:50}, B:{n:"신상",c:250000,s:150,is:"도난 불안",ec:20000,es:-70}},
      {q:"책상 정리", tag:"합리소비", A:{n:"바구니",c:2000,s:110,is:"깔끔함",ec:0,es:20}, B:{n:"디자인함",c:25000,s:120,is:"손목 아픔",ec:5000,es:-40}}
    ];

    let log = [];

    function startGame() { document.getElementById('screenStart').classList.add('hidden'); document.getElementById('screenPlay').classList.remove('hidden'); loadQ(); }
    
    function loadQ() {
      if(currentIdx >= quizData.length) return endGame();
      const d = quizData[currentIdx];
      document.getElementById('qTag').innerText = d.tag;
      document.getElementById('questionText').innerText = d.q;
      document.getElementById('textA').innerText = d.A.n;
      document.getElementById('textB').innerText = d.B.n;
      timeLeft = 45;
      document.getElementById('waitMsg').classList.add('hidden');
      timer = setInterval(()=>{
        timeLeft--;
        document.getElementById('timerText').innerText = `⏱️ ${timeLeft}초`;
        if(timeLeft <= 0) { clearInterval(timer); document.getElementById('waitMsg').classList.remove('hidden'); }
      }, 1000);
      document.getElementById('btnA').onclick = () => select('A');
      document.getElementById('btnB').onclick = () => select('B');
    }

    function select(t) {
      clearInterval(timer);
      const d = quizData[currentIdx][t];
      const c = d.c + d.ec, s = d.s + d.es;
      cost += c; sat += s;
      log.push({q:d.n, c, s});
      document.getElementById('issueDesc').innerText = d.is;
      document.getElementById('issueCost').innerText = `비용 +${d.ec}`;
      document.getElementById('issueSat').innerText = `만족감 ${d.es}`;
      document.getElementById('screenPlay').classList.add('hidden');
      document.getElementById('screenIssue').classList.remove('hidden');
      document.getElementById('btnConfirm').onclick = () => { currentIdx++; document.getElementById('screenIssue').classList.add('hidden'); document.getElementById('screenPlay').classList.remove('hidden'); loadQ(); };
    }

    function endGame() {
      document.getElementById('screenPlay').classList.add('hidden');
      document.getElementById('screenResult').classList.remove('hidden');
      document.getElementById('finalCost').innerText = cost.toLocaleString();
      document.getElementById('finalSat').innerText = sat;
      const tbody = document.getElementById('resultTableBody');
      log.forEach((l,i) => {
        tbody.innerHTML += `<tr><td>${i+1}</td><td>${l.q}</td><td>${l.c}</td><td>${l.s}</td></tr>`;
      });
    }

    document.getElementById('btnDownload').onclick = () => {
      html2canvas(document.getElementById('report-capture-area')).then(canvas => {
        const a = document.createElement('a'); a.download = '탐험보고서.png'; a.href = canvas.toDataURL(); a.click();
      });
    };
  </script>
</body>
</html>
