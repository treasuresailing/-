<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>합리적 소비 탐험대 3.0</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=DungGeunMo&display=swap" rel="stylesheet">

<style>

body{
    font-family:'Gaegu',sans-serif;
    background:#eef2ff;
    min-height:100vh;
    margin:0;
    padding:10px;
}

.pixel{
    font-family:'DungGeunMo',monospace;
}

.card{
    max-width:800px;
    margin:auto;
    background:white;
    border-radius:30px;
    padding:20px;
    box-shadow:0 10px 30px rgba(0,0,0,.15);
}

.choice-btn{
    width:100%;
    border:3px solid #c4b5fd;
    border-radius:16px;
    padding:18px;
    font-size:1.1rem;
    font-weight:700;
    transition:.2s;
    background:white;
}

.choice-btn:hover{
    transform:scale(1.02);
    background:#f5f3ff;
}

.hidden{
    display:none;
}

.result-table{
    width:100%;
    border-collapse:collapse;
    margin-top:10px;
}

.result-table th{
    background:#ede9fe;
    border:1px solid #ddd;
    padding:8px;
    font-size:.85rem;
}

.result-table td{
    border:1px solid #ddd;
    padding:8px;
    font-size:.85rem;
    text-align:center;
}

.grade-box{
    padding:15px;
    border-radius:16px;
    margin-top:15px;
    background:#f5f3ff;
}

.progress-wrap{
    width:100%;
    height:18px;
    background:#e5e7eb;
    border-radius:20px;
    overflow:hidden;
}

.progress-bar{
    height:100%;
    width:0%;
    background:linear-gradient(
        90deg,
        #8b5cf6,
        #ec4899
    );
    transition:.3s;
}

.badge{
    display:inline-block;
    padding:4px 10px;
    border-radius:999px;
    font-size:.8rem;
    font-weight:700;
}

.badge-rational{
    background:#dcfce7;
    color:#166534;
}

.badge-impulse{
    background:#fee2e2;
    color:#991b1b;
}

.issue-box{
    background:#fffbeb;
    border:3px solid #fcd34d;
    border-radius:20px;
    padding:20px;
}

.start-box{
    background:#f5f3ff;
    padding:20px;
    border-radius:20px;
}

.summary-box{
    background:#eff6ff;
    border-radius:15px;
    padding:12px;
    margin-top:12px;
}

@media(max-width:640px){

.choice-btn{
    font-size:1rem;
    padding:14px;
}

.card{
    padding:15px;
}

}

</style>
</head>

  <body>

<main class="card">

    <!-- 시작 화면 -->
    <section id="screenStart">

        <div class="text-center">

            <h1 class="pixel text-4xl text-purple-600 mb-4">
                합리적 소비 탐험대 3.0
            </h1>

            <div class="start-box text-lg">

                <p class="font-bold mb-3">
                    💰 용돈을 현명하게 사용하는 방법을 배워보세요!
                </p>

                <p>
                    총 12개의 소비 상황이 제시됩니다.
                </p>

                <p>
                    어떤 선택이 더 만족스럽고 합리적인지 생각하며 선택해보세요.
                </p>

                <p class="mt-3 text-purple-700 font-bold">
                    충동소비는 처음엔 즐겁지만
                    예상치 못한 문제가 발생할 수 있습니다.
                </p>

            </div>

            <div class="mt-5">
                <label class="font-bold">
                    학생 이름
                </label>

                <input
                    id="studentName"
                    type="text"
                    placeholder="이름 입력"
                    class="w-full border-2 border-purple-300 rounded-xl p-3 mt-2 text-center"
                >
            </div>

            <button
                onclick="startGame()"
                class="w-full mt-6 bg-purple-600 text-white font-bold py-4 rounded-xl text-xl"
            >
                🚀 게임 시작하기
            </button>

        </div>

    </section>

    <!-- 플레이 화면 -->
    <section id="screenPlay" class="hidden">

        <div class="flex justify-between items-center mb-3">

            <span id="questionNumber"
                class="font-bold text-purple-700">
                1 / 12
            </span>

            <span id="questionTag"
                class="badge badge-rational">
                합리소비
            </span>

        </div>

        <div class="progress-wrap mb-4">
            <div
                id="progressBar"
                class="progress-bar">
            </div>
        </div>

        <div class="text-right text-red-600 font-bold mb-3">
            <span id="timerText">
                ⏱️ 45초
            </span>
        </div>

        <h2
            id="questionText"
            class="text-2xl font-bold text-center mb-5">
        </h2>

        <div class="grid md:grid-cols-2 gap-4">

            <button
                id="btnA"
                class="choice-btn">
            </button>

            <button
                id="btnB"
                class="choice-btn">
            </button>

        </div>

        <div
            id="thinkingMessage"
            class="hidden text-center mt-5 text-red-500 font-bold">
            💡 충분히 생각했다면 선택해 보세요.
        </div>

    </section>

    <!-- 돌발상황 -->
    <section id="screenIssue" class="hidden">

        <div class="issue-box text-center">

            <h2 class="text-3xl font-bold text-amber-600 mb-3">
                🚨 돌발 상황 발생!
            </h2>

            <p
                id="issueTitle"
                class="text-xl font-bold mb-4">
            </p>

            <div class="grid md:grid-cols-2 gap-3 mb-4">

                <div class="bg-red-100 rounded-xl p-3">
                    <div class="font-bold">
                        추가 비용
                    </div>

                    <div
                        id="issueCost"
                        class="text-red-600 text-xl">
                    </div>
                </div>

                <div class="bg-blue-100 rounded-xl p-3">
                    <div class="font-bold">
                        만족도 변화
                    </div>

                    <div
                        id="issueSat"
                        class="text-blue-600 text-xl">
                    </div>
                </div>

            </div>

            <button
                id="btnIssueConfirm"
                class="bg-purple-600 text-white px-8 py-3 rounded-xl font-bold">
                다음 문제 ▶
            </button>

        </div>

    </section>

    <!-- 결과 화면 -->
    <section id="screenResult" class="hidden">

        <div id="captureArea">

            <h2 class="text-center text-3xl font-bold text-purple-700 mb-3">
                📊 소비 결과 보고서
            </h2>

            <div class="summary-box">

                <div class="font-bold">
                    학생 이름 :
                    <span id="resultName"></span>
                </div>

                <div class="mt-2">
                    총 소비 금액 :
                    <span
                        id="finalCost"
                        class="font-bold text-red-600">
                    </span>
                </div>

                <div class="mt-2">
                    총 만족도 :
                    <span
                        id="finalSat"
                        class="font-bold text-blue-600">
                    </span>
                </div>

            </div>

            <div
                id="gradeBox"
                class="grade-box text-center">

                <div
                    id="finalGrade"
                    class="text-2xl font-bold">
                </div>

                <div
                    id="finalComment"
                    class="mt-3 text-lg">
                </div>

            </div>

            <table class="result-table">

                <thead>

                <tr>
                    <th>번호</th>
                    <th>선택</th>
                    <th>비용</th>
                    <th>만족도</th>
                </tr>

                </thead>

                <tbody id="resultTableBody">

                </tbody>

            </table>

        </div>

        <button
            id="btnDownload"
            class="w-full mt-5 bg-green-600 text-white py-4 rounded-xl font-bold text-lg">

            📥 결과 이미지 저장

        </button>

        <button
            onclick="location.reload()"
            class="w-full mt-3 bg-gray-600 text-white py-4 rounded-xl font-bold">

            🔄 다시 하기

        </button>

    </section>

</main>
